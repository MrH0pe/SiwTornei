<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${squadra.nome} + ' — SiwTorneo'">Squadra</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
        <a th:if="${isAdmin}"
           href="/admin/tornei" style="color:#7a4010; font-weight:700;">⚙ Admin</a>
    </div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
        <span th:unless="${userDetails != null}">
            <a href="/login">Login</a>
            <a href="/register">Registrati</a>
        </span>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h1 th:text="${squadra.nome}">Nome Squadra</h1>
        <p><strong>Città:</strong> <span th:text="${squadra.citta}">—</span></p>
        <p><strong>Anno di fondazione:</strong> <span th:text="${squadra.annoDiFondazione}">—</span></p>
    </div>

    <h2>Giocatori</h2>
    <div th:if="${#lists.isEmpty(squadra.giocatori)}" class="alert alert-info">
        Nessun giocatore assegnato a questa squadra.
    </div>
    <table th:unless="${#lists.isEmpty(squadra.giocatori)}">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cognome</th>
                <th>Ruolo</th>
                <th>Altezza</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="giocatore : ${squadra.giocatori}">
                <td th:text="${giocatore.nome}"></td>
                <td th:text="${giocatore.cognome}"></td>
                <td th:text="${giocatore.ruolo}"></td>
                <td th:text="${giocatore.altezza} + ' cm'"></td>
            </tr>
        </tbody>
    </table>

    <div class="back-links">
        <a href="/squadre">← Tutte le squadre</a>
        <a href="/tornei">← Tutti i tornei</a>
    </div>
</div>

</body>
</html>
