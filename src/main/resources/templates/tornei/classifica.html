<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="'Classifica — ' + ${torneo.nome}">Classifica</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
        <a th:if="${userDetails != null and #strings.contains(userDetails.authorities.toString(), 'ROLE_ADMIN')}"
           href="/admin/tornei" style="color:#7a4010; font-weight:700;">⚙ Admin</a>
    </div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
        <span th:unless="${userDetails != null}">
            <a href="/login">Login</a>
            <a href="/register">Registrati</a>
        </span>
    </div>
</nav>

<div class="container">
    <h1>Classifica — <span th:text="${torneo.nome}"></span> <span th:text="${torneo.anno}"></span></h1>

    <div th:if="${classifica.isEmpty()}" class="alert alert-info">
        Nessun dato disponibile per la classifica.
    </div>

    <table class="classifica-table" th:unless="${classifica.isEmpty()}">
        <thead>
            <tr>
                <th>#</th>
                <th>Squadra</th>
                <th>Punti</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="entry, stat : ${classifica}">
                <td th:text="${stat.count}"></td>
                <td th:text="${entry.key.nome}"></td>
                <td><strong th:text="${entry.value}"></strong></td>
            </tr>
        </tbody>
    </table>

    <div class="back-links">
        <a th:href="@{'/tornei/' + ${torneo.id}}">← Torna al torneo</a>
    </div>
</div>

</body>
</html>
