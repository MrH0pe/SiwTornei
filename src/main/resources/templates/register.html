<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrati — SiwTorneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
    </div>
    <div class="nav-auth">
        <a href="/login">Login</a>
        <a href="/register">Registrati</a>
    </div>
</nav>

<div class="auth-container">
    <h1>Registrati</h1>

    <form action="/register" method="POST" th:object="${credentials}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="nome">Nome
            <input type="text" id="nome" th:field="*{user.nome}" required/>
        </label>
        <div th:if="${#fields.hasErrors('user.nome')}" th:errors="*{user.nome}" class="alert alert-danger"></div>

        <label for="cognome">Cognome
            <input type="text" id="cognome" th:field="*{user.cognome}" required/>
        </label>
        <div th:if="${#fields.hasErrors('user.cognome')}" th:errors="*{user.cognome}" class="alert alert-danger"></div>

        <label for="email">Email
            <input type="email" id="email" th:field="*{user.email}" required/>
        </label>
        <div th:if="${#fields.hasErrors('user.email')}" th:errors="*{user.email}" class="alert alert-danger"></div>

        <label for="username">Username
            <input type="text" id="username" th:field="*{username}" required/>
        </label>
        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="alert alert-danger"></div>

        <label for="password">Password
            <input type="password" id="password" th:field="*{password}" required/>
        </label>
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="alert alert-danger"></div>

        <button type="submit" class="mt-16">Registrati</button>
    </form>

    <p>Hai già un account? <a href="/login">Accedi</a></p>
</div>

</body>
</html>
