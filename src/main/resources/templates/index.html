<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Tornei di Calcio Amatoriale</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
        <a th:if="${isAdmin}"
           href="/admin/tornei" style="color:#7a4010; font-weight:700;">⚙ Admin</a>
    </div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
        <span th:unless="${userDetails != null}">
            <a href="/login">Login</a>
            <a href="/register">Registrati</a>
        </span>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h1>Benvenuto nei Tornei di Calcio Amatoriale</h1>
        <p>Segui i tuoi tornei preferiti, le partite e la classifica in tempo reale.</p>
        <div class="hero-links">
            <a href="/tornei" class="btn btn-primary">Vedi i Tornei</a>
            <a href="/squadre" class="btn btn-success">Vedi le Squadre</a>
        </div>
    </div>
</div>

</body>
</html>
