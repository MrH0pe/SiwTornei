<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Partita — SiwTorneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
        <a th:if="${isAdmin}"
           href="/admin/tornei" style="color:#7a4010; font-weight:700;">⚙ Admin</a>
    </div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
        <span th:unless="${userDetails != null}">
            <a href="/login">Login</a>
            <a href="/register">Registrati</a>
        </span>
    </div>
</nav>

<div class="container">

    <div class="card">
        <h1>
            <span th:text="${partita.squadraCasa.nome}">Casa</span>
            vs
            <span th:text="${partita.squadraOspite.nome}">Ospite</span>
        </h1>
        <div class="partita-info">
            <p><strong>Torneo:</strong>
                <a th:href="@{'/tornei/' + ${partita.torneo.id}}" th:text="${partita.torneo.nome}"></a></p>
            <p><strong>Data e ora:</strong> <span th:text="${#temporals.format(partita.dataOra, 'dd/MM/yyyy HH:mm')}">—</span></p>
            <p><strong>Luogo:</strong> <span th:text="${partita.luogo}">—</span></p>
            <p><strong>Arbitro:</strong>
                <span th:text="${partita.arbitro.nome} + ' ' + ${partita.arbitro.cognome}">—</span></p>
        </div>

        <div th:if="${partita.stato.name() == 'PLAYED'}" class="risultato-box">
            <span th:text="${partita.squadraCasa.nome}">Casa</span>
            <span th:text="${partita.goalsHome}">0</span>
            —
            <span th:text="${partita.goalsAway}">0</span>
            <span th:text="${partita.squadraOspite.nome}">Ospite</span>
        </div>
        <div th:unless="${partita.stato.name() == 'PLAYED'}" class="da-giocare">
            Partita ancora da giocare
        </div>
    </div>

    <!--
        SEZIONE COMMENTI — gestita da React (file: static/js/commenti.js)

        Questo div è il "punto di aggancio" di React: al caricamento della pagina,
        commenti.js trova questo div tramite id="commenti-root" e ci monta sopra
        il componente, che da quel momento gestisce tutto dinamicamente.

        Gli attributi th:data-* sono scritti da Thymeleaf lato server e diventano
        attributi HTML standard (data-partita-id, data-username, ecc.).
        React li legge via JavaScript con rootEl.dataset.* per sapere:
          - quale partita mostrare (partita-id)
          - chi è l'utente loggato (username, is-admin, logged-in)
          - il token CSRF da allegare alle richieste POST e DELETE
            (Spring Security lo richiede per proteggersi da attacchi cross-site)
    -->
    <div id="commenti-root"
         th:data-partita-id="${partita.id}"
         th:data-username="${userDetails != null ? userDetails.username : ''}"
         th:data-is-admin="${isAdmin}"
         th:data-logged-in="${userDetails != null}"
         th:data-csrf-token="${_csrf.token}"
         th:data-csrf-header="${_csrf.headerName}">
    </div>

    <!--
        Librerie React servite in locale da static/js (nessun npm/webpack necessario,
        e la pagina funziona anche senza connessione internet).
        - react.production.min.js  → il motore React (componenti, stato, hook)
        - react-dom.production.min.js → la parte che collega React al DOM del browser
        - commenti.js (defer)   → il nostro componente; "defer" garantisce che venga
          eseguito solo dopo che react e react-dom sono già stati caricati e la
          pagina è completamente analizzata dal browser.
    -->
    <script th:src="@{/js/react.production.min.js}"></script>
    <script th:src="@{/js/react-dom.production.min.js}"></script>
    <script th:src="@{/js/commenti.js}" defer></script>

    <div class="back-links">
        <a th:href="@{'/tornei/' + ${partita.torneo.id}}">← Torna al torneo</a>
    </div>
</div>

</body>
</html>
