<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Torneo — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links"><a href="/tornei">Tornei</a><a href="/squadre">Squadre</a></div>
</nav>
<div class="admin-nav">
    <span>Admin:</span>
    <a href="/admin/tornei">Tornei</a>
    <a href="/admin/squadre">Squadre</a>
    <a href="/admin/giocatori">Giocatori</a>
    <a href="/admin/partite">Partite</a>
    <a href="/admin/arbitri">Arbitri</a>
</div>

<div class="container">
    <h1>Modifica torneo</h1>

    <div th:if="${torneoEsistente}" class="alert alert-danger" th:text="${torneoEsistente}"></div>

    <form th:action="@{/admin/tornei/{id}/edit(id=${torneo.id})}" th:object="${torneo}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Nome <input type="text" th:field="*{nome}" required/></label>
        <label>Anno <input type="number" th:field="*{anno}" min="2000" max="2030"/></label>
        <label>Descrizione <input type="text" th:field="*{descrizione}"/></label>
        <button type="submit" class="mt-16">Salva modifiche</button>
    </form>

    <a href="/admin/tornei">← Annulla</a>
</div>

</body>
</html>
