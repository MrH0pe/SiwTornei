<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Squadre del Torneo — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links"><a href="/tornei">Tornei</a><a href="/squadre">Squadre</a></div>
</nav>
<div class="admin-nav">
    <span>Admin:</span>
    <a href="/admin/tornei">Tornei</a>
    <a href="/admin/squadre">Squadre</a>
    <a href="/admin/giocatori">Giocatori</a>
    <a href="/admin/partite">Partite</a>
    <a href="/admin/arbitri">Arbitri</a>
</div>

<div class="container">
    <h1>Squadre — <span th:text="${torneo.nome}"></span> <span th:text="${torneo.anno}"></span></h1>

    <h2>Squadre iscritte</h2>
    <div th:if="${#lists.isEmpty(torneo.squadre)}" class="alert alert-info">
        Nessuna squadra iscritta.
    </div>
    <table th:unless="${#lists.isEmpty(torneo.squadre)}">
        <thead><tr><th>Nome</th><th>Città</th><th>Azioni</th></tr></thead>
        <tbody>
            <tr th:each="squadra : ${torneo.squadre}">
                <td th:text="${squadra.nome}"></td>
                <td th:text="${squadra.citta}"></td>
                <td>
                    <form th:action="@{/admin/tornei/{id}/squadre/{sid}/remove(id=${torneo.id},sid=${squadra.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn-danger">Rimuovi</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <h2>Aggiungi squadra</h2>
    <div th:if="${#lists.isEmpty(squadreDisponibili)}" class="alert alert-info">
        Tutte le squadre sono già iscritte.
    </div>
    <form th:unless="${#lists.isEmpty(squadreDisponibili)}"
          th:action="@{/admin/tornei/{id}/squadre/add(id=${torneo.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Squadra
            <select name="squadraId">
                <option th:each="s : ${squadreDisponibili}"
                        th:value="${s.id}"
                        th:text="${s.nome} + ' (' + ${s.citta} + ')'"></option>
            </select>
        </label>
        <button type="submit" class="mt-16">Aggiungi</button>
    </form>

    <div class="back-links">
        <a href="/admin/tornei">← Torna ai tornei</a>
    </div>
</div>

</body>
</html>
