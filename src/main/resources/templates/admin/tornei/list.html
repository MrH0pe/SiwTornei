<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
    </div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
    </div>
</nav>
<div class="admin-nav">
    <span>Admin:</span>
    <a href="/admin/tornei">Tornei</a>
    <a href="/admin/squadre">Squadre</a>
    <a href="/admin/giocatori">Giocatori</a>
    <a href="/admin/partite">Partite</a>
    <a href="/admin/arbitri">Arbitri</a>
</div>

<div class="container">
    <h1>Gestione Tornei</h1>
    <a href="/admin/tornei/new" class="btn btn-primary">+ Nuovo Torneo</a>

    <table style="margin-top:20px;">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Anno</th>
                <th>Descrizione</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="torneo : ${listaTornei}">
                <td th:text="${torneo.nome}"></td>
                <td th:text="${torneo.anno}"></td>
                <td th:text="${torneo.descrizione}"></td>
                <td>
                    <div class="actions">
                        <a th:href="@{/tornei/{id}/classifica(id=${torneo.id})}" class="btn btn-success">Classifica</a>
                        <a th:href="@{/admin/tornei/{id}/squadre(id=${torneo.id})}" class="btn btn-info">Squadre</a>
                        <a th:href="@{/admin/tornei/{id}/edit(id=${torneo.id})}" class="btn btn-primary">Modifica</a>
                        <form th:action="@{/admin/tornei/{id}/delete(id=${torneo.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-danger"
                                    onclick="return confirm('Eliminare questo torneo?')">Elimina</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
