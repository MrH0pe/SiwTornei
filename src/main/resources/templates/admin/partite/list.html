<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Partite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links"><a href="/tornei">Tornei</a><a href="/squadre">Squadre</a></div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
    </div>
</nav>
<div class="admin-nav">
    <span>Admin:</span>
    <a href="/admin/tornei">Tornei</a>
    <a href="/admin/squadre">Squadre</a>
    <a href="/admin/giocatori">Giocatori</a>
    <a href="/admin/partite">Partite</a>
    <a href="/admin/arbitri">Arbitri</a>
</div>

<div class="container">
    <h1>Gestione Partite</h1>
    <a href="/admin/partite/new" class="btn btn-primary">+ Nuova Partita</a>

    <table style="margin-top:20px;">
        <thead>
            <tr>
                <th>Data/Ora</th>
                <th>Luogo</th>
                <th>Torneo</th>
                <th>Casa</th>
                <th>Ospite</th>
                <th>Stato</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="partita : ${listaPartite}">
                <td th:text="${#temporals.format(partita.dataOra, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${partita.luogo}"></td>
                <td th:text="${partita.torneo.nome}"></td>
                <td th:text="${partita.squadraCasa.nome}"></td>
                <td th:text="${partita.squadraOspite.nome}"></td>
                <td>
                    <span th:if="${partita.stato.name() == 'PLAYED'}" class="badge badge-played">Giocata</span>
                    <span th:unless="${partita.stato.name() == 'PLAYED'}" class="badge badge-scheduled">Programmata</span>
                </td>
                <td>
                    <div class="actions">
                        <a th:if="${partita.stato.name() == 'PLAYED'}"
                           th:href="@{/admin/partite/{id}/risultato(id=${partita.id})}" class="btn btn-success">Risultato</a>
                        <a th:href="@{/admin/partite/{id}/edit(id=${partita.id})}" class="btn btn-primary">Modifica</a>
                        <form th:action="@{/admin/partite/{id}/delete(id=${partita.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-danger"
                                    onclick="return confirm('Eliminare questa partita?')">Elimina</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
