<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuovo Arbitro — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links"><a href="/tornei">Tornei</a><a href="/squadre">Squadre</a></div>
</nav>
<div class="admin-nav">
    <span>Admin:</span>
    <a href="/admin/tornei">Tornei</a>
    <a href="/admin/squadre">Squadre</a>
    <a href="/admin/giocatori">Giocatori</a>
    <a href="/admin/partite">Partite</a>
    <a href="/admin/arbitri">Arbitri</a>
</div>

<div class="container">
    <h1>Crea nuovo arbitro</h1>

    <div th:if="${arbitroEsistente}" class="alert alert-danger" th:text="${arbitroEsistente}"></div>

    <form th:action="@{/admin/arbitri/new}" th:object="${nuovoArbitro}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label>Nome <input type="text" th:field="*{nome}" required/></label>
        <label>Cognome <input type="text" th:field="*{cognome}" required/></label>
        <label>Codice Arbitrale <input type="text" th:field="*{codiceArbitrale}" required/></label>
        <button type="submit" class="mt-16">Salva</button>
    </form>

    <a href="/admin/arbitri">← Annulla</a>
</div>

</body>
</html>
