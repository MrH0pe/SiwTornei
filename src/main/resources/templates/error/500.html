<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>500 — Errore interno</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links"><a href="/tornei">Tornei</a><a href="/squadre">Squadre</a></div>
</nav>

<div class="container">
    <div class="error-box">
        <div class="error-code">500</div>
        <h1>Qualcosa è andato storto</h1>

        <!-- niente dettagli tecnici all'utente: lo stack trace è nei log del server -->
        <p>Si è verificato un errore interno. Non è colpa tua: riprova tra qualche istante.</p>

        <span class="error-path" th:if="${path != null}" th:text="${path}">/percorso</span>

        <div class="error-actions">
            <a href="/" class="btn btn-primary">🏠 Torna alla home</a>
            <a href="javascript:location.reload()" class="btn btn-info">↻ Riprova</a>
        </div>
    </div>
</div>

</body>
</html>
