<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Commento</title>
    </head>
<body>
    
    <div>
        <h2>Modifica il tuo commento</h2>

        <form th:action="@{/commenti/{id}/edit(id=${commento.id})}" method="POST">
            
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div>
                <label for="testo">Testo:</label><br>
                <textarea id="testo" name="testo" rows="4" cols="50" required th:text="${commento.testo}"></textarea>
            </div>

            <div style="margin-top: 15px;">
                <button type="submit">Salva Modifiche</button>
                
                <a th:href="@{/partite/{id}(id=${commento.partita.id})}">
                    <button type="button">Annulla</button>
                </a>
            </div>
        </form>
    </div>

</body>
</html>
