<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Commento — SiwTorneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-brand"><a href="/">⚽ SiwTorneo</a></div>
    <div class="nav-links">
        <a href="/tornei">Tornei</a>
        <a href="/squadre">Squadre</a>
    </div>
    <div class="nav-auth">
        <span th:if="${userDetails != null}">
            Ciao <strong th:text="${userDetails.username}"></strong>
            <form th:action="@{/logout}" method="POST" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </span>
    </div>
</nav>

<div class="auth-container">
    <h1>Modifica commento</h1>

    <form th:action="@{/commenti/{id}/edit(id=${commento.id})}" method="POST">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="testo">Testo
            <textarea id="testo" name="testo" rows="5" required
                      th:text="${commento.testo}"></textarea>
        </label>

        <div style="display:flex; gap:10px; margin-top:14px;">
            <button type="submit">Salva modifiche</button>
            <a th:href="@{/partite/{id}(id=${commento.partita.id})}"
               class="btn btn-secondary" style="background:#e0e0e0;color:#333;">Annulla</a>
        </div>
    </form>
</div>

</body>
</html>
